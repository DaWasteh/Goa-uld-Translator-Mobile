metadata:
  purpose: 'Sprachausbau v3: Beleidigungen, Schimpfwörter, Flüche und vulgäre Sprache (DE/EN)'
  created: '2026-07-03'
  updated: '2026-07-03'
  schema_note: Gleiches Schema wie goauld_overrides.yaml; wird als Overlay nach v2 geladen.
  design_rules:
  - 'Canon bleibt dominant: alle Prioritäten <= 60. Bestehende Canon-Beleidigungen (Shol''va,
    Ha''shak, Goe''nahk, Mikta, Mai''tac, Unas''kal, Kek''kal) bleiben unangetastet.'
  - 'Layer A (prio 60): fanon_strict-Komposita ausschließlich aus Registry-Roots.'
  - 'Layer B (prio 55): neue Roots aus ägyptischen Etyma (Phonologie-Mapping: ḫ→kh, š→sh, ḏ→dj,
    ṯ→tj, ꜣ/ꜥ→a, w→u, j→i).'
  - 'Layer C (prio 55): Glossen-Nachträge auf bestehende Formen (umgangssprachliche/vulgäre Synonyme).'
  - 'Layer D (prio 55): fanon_derived-Komposita mit Substrat-/Canon-Roots.'
  - 'Inhaltliche Leitplanke: allgemeine Vulgär- und Verachtungssprache ja; keine diskriminierenden
    Slurs gegen reale Gruppen (Ethnie, Religion, Orientierung, Behinderung).'
  - 'Stilprinzip: Goa''uld beleidigt über Verachtung und Herabsetzung (Wurm, Sklave, Abschaum,
    Namenloser), nicht über moderne Anatomie-Slurs — vulgäre DE/EN-Glossen mappen auf diese Register.'
  - 'review_status: proposed — einzeln hebbar oder streichbar.'
