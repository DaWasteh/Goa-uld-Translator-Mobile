      roots: [tap, tar]
      target_meaning: "collective humanity / humankind"
      rationale: "Plural first-person root plus Tar avoids collision with Tau'ri."
    review_status: approved
    senses:
      - id: app-humanity-collective
        pos: noun
        category: "Conflict resolution: humans"
        context: "Collective humanity, humankind, or a people/race as a whole."
        glosses:
          de: [menschheit, menschenvolk, volk der menschen, menschliche rasse]
          en: [humanity, humankind, human race, human people]
        source:
          tier: fanon_strict
          ref: "Tap + Tar, reviewed conflict resolution"
        priority: 95
        examples:
          - goauld: "Tap'tar nem ron."
            de: "Die Menschheit ist frei."
            en: "Humanity is free."
            mode: literal

