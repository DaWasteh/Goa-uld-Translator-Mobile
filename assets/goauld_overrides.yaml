# Runtime and language-development overlay for the Goa'uld Translator.
#
# This file is curated by hand and loaded after goauld_lexicon.yaml.  It is
# intentionally the place for deterministic corrections, core-grammar decisions,
# reviewed fanon, and Egyptian-substrate candidates.  The four Markdown files are
# historical/source documents; runtime behavior must be data-driven here or in
# goauld_lexicon.yaml.
metadata:
  purpose: "Canon-first language expansion, conflict resolution, and runtime lookup overrides"
  created: "2026-06-15"
  updated: "2026-06-15"
  source_plan: "plans/sprachausbau-und-woerterbuch-plan.md (implemented; plan file deleted per user request)"
  schema_note: "Unknown fields are documentary; yaml_loader consumes entries.*.senses.*.glosses/source/priority."
  language_principles:
    - "Canon entries stay dominant unless a reviewed fanon specialization is explicitly requested."
    - "Fanon terms must document roots, literal meaning, target meaning, register, source tier, and examples."
    - "Egyptian substrate terms are low-priority etymological roots and must not override canon/fanon defaults."
    - "DE and EN glosses are kept together on the same Goa'uld sense to prevent drift."

phonology:
  goauld_style:
    preferred_segments: [k, t, r, sh, ch, gh, a, e]
    syllable_shapes: [CV, CVC, "CVC'CVC"]
    apostrophe_policy: "Use apostrophe only for morpheme boundary or glottal stop."
  egyptian_to_goauld_mapping:
    "ꜣ": a
    "ꜥ": a
    "ḥ": h
    "ḫ": kh
    "ẖ": kh
    "š": sh
    "ṯ": tj
    "ḏ": dj
    "j": i
    "w": u
    "y": i

# Curated substrate reservoir.  These are etymological candidates, not normal
# high-priority translations.  TLA numeric IDs must be filled during philological
# review before a candidate can be promoted above egyptian_substrate priority.
egyptian_substrate:
  rn:
    transliteration: rn
    egyptological_reading: ren
    meaning: [name, identity]
    tla_id: "pending_verified_tla_id:rn"
    goauld_candidate_root: Ren
    status: approved_candidate
    notes: "Supports fanon Ren breath/name/identity domain without displacing canon shal mak for 'name'."
  nTr:
    transliteration: nṯr
    egyptological_reading: netjer
    meaning: [god, divine]
    tla_id: "pending_verified_tla_id:nTr"
    goauld_candidate_root: Netjer
    status: reservoir_only
    notes: "Do not use for default 'god'; canon Onak/Goa'uld remain primary."
  pr:
    transliteration: pr
    egyptological_reading: per
    meaning: [house, domain]
    tla_id: "pending_verified_tla_id:pr"
    goauld_candidate_root: Per
    status: reservoir_only
    notes: "House/domain substrate; existing Nona'kor remains the active house word."
  ib:
    transliteration: ib
    egyptological_reading: ib
    meaning: [heart, mind]
    tla_id: "pending_verified_tla_id:ib"
    goauld_candidate_root: Ib
    status: reservoir_only
    notes: "Conceptual heart/mind substrate; Kal/Kal'tal remains active."
  ankh:
    transliteration: anx
    egyptological_reading: ankh
    meaning: [life, live]
    tla_id: "pending_verified_tla_id:anx"
    goauld_candidate_root: Ankh
    status: reservoir_only
    notes: "Life substrate; active Goa'uld root is Ska/Met'ska."
  ra:
    transliteration: ra
    egyptological_reading: ra
    meaning: [sun, solar power]
    tla_id: "pending_verified_tla_id:ra"
    goauld_candidate_root: Ra
    status: canon_name
    notes: "Canon proper name/divine solar reference; do not generalize where Cha'mel suffices."
  sbA:
    transliteration: sbꜣ
    egyptological_reading: seba
    meaning: [star, gate, teaching]
    tla_id: "pending_verified_tla_id:sbA"
    goauld_candidate_root: Seba
    status: reservoir_only
    notes: "Useful only as annotated etymology for star/gate/learning concepts."
  mAat:
    transliteration: mꜣꜥt
    egyptological_reading: maat
    meaning: [truth, order]
    tla_id: "pending_verified_tla_id:mAat"
    goauld_candidate_root: Maat
    status: reservoir_only
    notes: "Truth/order substrate; active truth root remains Dan."
  sxm:
    transliteration: sxm
    egyptological_reading: sekhem
    meaning: [power, authority]
    tla_id: "pending_verified_tla_id:sxm"
    goauld_candidate_root: Sekhem
    status: reservoir_only
    notes: "Authority substrate; canon Onak remains primary for divine power."
  mdw:
    transliteration: mdw
    egyptological_reading: medu
    meaning: [word, speech]
    tla_id: "pending_verified_tla_id:mdw"
    goauld_candidate_root: Medu
    status: reservoir_only
    notes: "Speech substrate; active Goa'uld uses Meta."

entries:
  app_override_tau_ri_humans:
    term: "Tau'ri"
    variants: ["tau'ri"]
    register: canon
    dialect: standard_goauld
    priority: 110
    morphology:
      type: compound
      components: [tau, ri]
      literal: "First World / people of Earth"
    review_status: approved
    register_usage:
      goauld_imperial: preferred
      jaffa_military: allowed
      tokra_resistance: allowed
      modern_fanon: preferred
    senses:
      - id: app-human-earth-default
        pos: noun
        category: "Conflict resolution: humans"
        context: "Default Stargate-context rendering for Earth humans / people of Earth."
        glosses:
          de: [mensch, menschen, erdmensch, erdmenschen, menschen der erde]
          en: [human, humans, earth human, earth humans, people of earth]
        avoid_for:
          de: [menschheit als abstraktes Konzept, generischer Sklave]
          en: [humanity as abstract concept, generic slave]
        source:
          tier: canon_series
          ref: "Canon-first override: prefer Tau'ri for Earth-human default lookup"
        priority: 110
        examples:
          - goauld: "Tau'ri kree."
            de: "Mensch der Erde, hör zu."
            en: "Human of Earth, listen."
            mode: canon

  app_override_tar_generic_human:
    term: Tar
    variants: [tar]
    register: canon
    dialect: standard_goauld
    priority: 94
    morphology:
      type: root
      literal: "human/person root"
    review_status: approved
    senses:
      - id: app-human-generic
        pos: noun
        category: "Conflict resolution: humans"
        context: "Generic/neutral human as species/person; not specifically Tau'ri and not Lo'taur slave status."
        glosses:
          de: [menschlich, generischer mensch, mensch als gattung, person]
          en: [generic human, human as species, human person, person]
        avoid_for:
          de: [menschen der erde, menschheit, menschlicher sklave]
          en: [earth humans, humanity, human slave]
        source:
          tier: canon_rpg
          ref: "RPG root specialized by language plan: Tar = generic human/person"
        priority: 94
        examples:
          - goauld: "Tar ia onak."
            de: "Ein Mensch ist kein Gott."
            en: "A human is not a god."
            mode: literal

  app_override_tap_tar_humanity:
    term: "Tap'tar"
