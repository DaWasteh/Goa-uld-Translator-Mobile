# ═════════════════════════════════════════════════════════════════════
#  GOA'ULD SPRACHAUSBAU v1  ·  Overlay-Erweiterung
#  154 neue Einträge · Layer A/B/C · alle Prioritäten <= 60 (unter Canon)
#  Wird von yaml_loader.py als zusätzliches Overlay nach goauld_overrides.yaml geladen.
# ═════════════════════════════════════════════════════════════════════

metadata:
  purpose: 'Sprachausbau v1: Alltagswortschatz aus Registry-Root-Komposita und ägyptischem Substrat'
  created: '2026-07-02'
  updated: '2026-07-02'
  schema_note: Gleiches Schema wie goauld_overrides.yaml; yaml_loader konsumiert entries.*.senses.*.glosses/source/priority.
  design_rules:
  - 'Canon bleibt dominant: alle Prioritäten <= 60, unterhalb jedes Canon-Eintrags.'
  - 'Layer A (prio 60): fanon_strict-Komposita ausschließlich aus goauld_root_registry.yaml-Roots.'
  - 'Layer B (prio 55): neue Roots aus ägyptischen Etyma, Phonologie-Mapping aus goauld_overrides.yaml
    angewandt (ḫ→kh, š→sh, ḏ→dj, ṯ→tj, ꜣ/ꜥ→a, w→u, j→i).'
  - 'Layer C (prio 55): Glossen-Nachträge für Registry-Roots, deren Kernbedeutung im Lexikon fehlte (kor=eisen,
    tun=viel, shel=schützen, dan=richtig, cha=licht).'
  - na-Präfix nur als lexikalisierte Antonyme gemäß GOAULD_GRAMMAR.md §6.
  - 'review_status: proposed — Einträge können einzeln auf approved gehoben oder gestrichen werden.'
