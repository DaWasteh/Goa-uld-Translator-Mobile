# ═════════════════════════════════════════════════════════════════════
#  GOA'ULD SPRACHAUSBAU v4  ·  Overlay-Erweiterung
#  Bairische Beleidigungen, Flüche & Kraftausdrücke · 19 Einträge · Layer A/C/D
#  Ladereihenfolge: overrides → v1 → v2 → v3 → diese Datei.
# ═════════════════════════════════════════════════════════════════════

metadata:
  purpose: 'Sprachausbau v4: Bairische Schimpfwörter, Flüche und Kraftausdrücke (Boarisch → Goa''uld)'
  created: '2026-07-03'
  updated: '2026-07-03'
  schema_note: Gleiches Schema wie goauld_overrides.yaml; wird als Overlay nach v3 geladen.
  design_rules:
  - 'Canon bleibt dominant: alle Prioritäten <= 60.'
  - 'Layer A (prio 60): fanon_strict-Komposita ausschließlich aus Registry-Roots.'
  - 'Layer C (prio 55): bairische Glossen-Nachträge auf bestehende Formen (Canon + v3).'
  - 'Layer D (prio 55): fanon_derived-Komposita mit Substrat-/Canon-/v3-Roots.'
  - 'Übersetzungsprinzip: Bairisch flucht blasphemisch über Kruzifix und Herrgott — Goa''uld
    flucht äquivalent über die (toten) Götter (onak+kek). Semantische Register statt
    Wort-für-Wort-Übertragung.'
  - 'Regionalspott (Preiß/Saupreiß) wird als "Zugereister/Fremder" (na+pac+tar) abgebildet —
    jocular-folkloristisch, kein Slur-Register.'
  - 'review_status: proposed — einzeln hebbar oder streichbar.'
entries:

  # ── LAYER A · prio 60 · Registry-Root-Komposita ──────────────────────

  exp_v4_onak_kek:
    term: Onak'kek
    variants:
    - onak'kek
    - onak'kek!
    register: fanon_strict
    dialect: standard_goauld
    priority: 60
    morphology:
      type: compound
      literal: Gott-Tod
      components:
      - onak
      - kek
    review_status: proposed
    senses:
    - id: exp-v4-onak-kek
      pos: interjection
      category: Sprachausbau v4 (Bairische Beleidigungen & Flüche)
      glosses:
        de:
        - kreizkruzefix
        - kruzifix (fluch)
        - himmelherrgott
        - himme hergott
        - himmiherrgott
        - sakrament (fluch)
        - kreizsakrament
        - herrgottsakrament
        en:
        - for heaven's sake
        - by the dead gods
        - goddammit (blasphemous)
      source:
        tier: fanon_strict
        ref: 'Sprachausbau v4: Kompositum onak+kek — der blasphemische Fluch. Wie der Bayer
          beim Kruzifix flucht, flucht der Jaffa bei den toten Göttern: "Gott-Tod!" ist die
          schwerste denkbare Gotteslästerung im Goa''uld-Kult'
      priority: 60
      examples:
      - goauld: Onak'kek! Ha'tak kek.
        de: Kreizkruzefix! Das Schiff ist hin.
        en: Goddammit! The ship is done for.
        mode: literal

