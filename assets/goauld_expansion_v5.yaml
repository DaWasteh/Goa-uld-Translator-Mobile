metadata:
  purpose: 'Sprachausbau v5: systematische Schließung von Grundwortschatz-Lücken (DE/EN/Bairisch) — Zeit,
    Familie, Richtungen, Alltagsverben/-adjektive, Essen, bairischer Alltag sowie fehlende EN/DE-Glossen
    auf Bestandsformen'
  created: '2026-07-03'
  updated: '2026-07-03'
  schema_note: Gleiches Schema wie goauld_overrides.yaml; wird als Overlay nach v4 geladen.
  design_rules:
  - 'Canon bleibt dominant: alle Prioritäten <= 60; v5 durchgehend konservativ fanon_derived (prio 55).'
  - 'Neue Roots aus ägyptischen Etyma (Phonologie-Mapping: ḫ→kh, š→sh, ḏ→dj, ṯ→tj, ꜣ/ꜥ→a, w→u, j→i); Komposita
    aus etablierten Bestandsroots.'
  - Glossen-Nachträge (Slug-Präfix exp_v5_c_) ergänzen fehlende EN- oder DE-Glossen sowie bairische Synonyme
    auf bestehenden Formen.
  - 'Basis: systematischer Lückenscan von Hochfrequenzvokabular DE/EN/Bairisch gegen die Engine inkl.
    Lemmatizer.'
  - 'review_status: proposed — einzeln hebbar oder streichbar.'
