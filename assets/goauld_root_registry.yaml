# Goa'uld Root Registry
#
# Stable registry for productive roots used by goauld_lexicon.yaml and the
# curated overlay goauld_overrides.yaml.  New fanon terms should cite these roots
# instead of inventing unrelated forms.
meta:
  version: 1
  created: "2026-06-15"
  updated: "2026-06-15"
  companion_docs:
    - GOAULD_GRAMMAR.md
    - goauld_lexicon.yaml
    - goauld_overrides.yaml
  policy:
    - "Canon roots are protected."
    - "Fanon roots need derivation, DE+EN glosses, register, status, and example."
    - "Egyptian-substrate roots stay low priority until philologically reviewed."

status_values:
  canon: "Attested in canon/guide/RDA-derived lists."
  canon_derived: "Directly derived from attested canon morphology."
  fanon_strict: "Productive fanon built from attested roots."
  fanon_derived: "Plausible but less directly attested."
  egyptian_substrate: "Curated Egyptian etymological reservoir; not a default runtime lookup."
  deprecated: "Do not use for new words."

roots:
  kree:
    core_meaning:
      de: [befehl, achtung, hören, imperativ]
      en: [command, attention, listen, imperative]
    status: canon
    source_tier: canon_series
    productive: true
    domains: [command, military, attention]
    notes: "Extremely polysemous; do not overuse for every verb. Use for command-force and attention."
    examples: ["Jaffa, kree!"]

  kek:
    core_meaning:
      de: [tod, schwäche, tödlich]
      en: [death, weakness, lethal]
    status: canon
    source_tier: canon_series
    productive: true
    domains: [death, war, weakness]
    cultural_note: "Goa'uld metaphor: weakness is near-death."
    examples: ["Kek ia nem ron."]

  kel:
    core_meaning:
      de: [frage, interrogativ]
      en: [question, interrogative]
    status: canon
    source_tier: canon_guide
    productive: true
    domains: [questions, grammar]
    notes: "Compact canon interrogative; precise fanon compounds use Kel + semantic root."
    examples: ["Kel'tar", "Kel'pac", "Kel'nok"]

  shal:
    core_meaning:
      de: [was, welcher, ritueller fragekern]
      en: [what, which, ritual question root]
    status: canon
    source_tier: canon_guide
    productive: limited
    domains: [questions, ritual]
    notes: "Do not use as universal question root where Kel compounds are clearer."

  ta:
    core_meaning:
      de: [ich, mich, mir]
      en: [i, me]
    status: canon
    source_tier: canon_rda
    productive: true
    domains: [pronouns]
    notes: "Default first-person pronoun in app grammar."

  tel:
    core_meaning:
      de: [ich habe, sprecherpräsenz]
      en: [i have, speaker presence]
    status: canon
    source_tier: canon_guide
    productive: limited
    domains: [pronouns, possession]
    notes: "Specialized after conflict review; plain 'I' should prefer Ta."

  lo:
    core_meaning:
      de: [du, dich, dir]
      en: [you]
    status: canon
    source_tier: canon_rda
    productive: true
    domains: [pronouns]
    examples: ["Lo Shol'va."]

  p_suffix:
    written_form: "-p"
    core_meaning:
      de: [plural]
      en: [plural]
    status: canon_derived
    source_tier: canon_rda
    productive: reviewed_only
    domains: [morphology]
    examples: ["Ta → Tap", "Lo → Lop"]

  ia:
    core_meaning:
      de: [nicht, satznegation]
      en: [not, sentence negation]
    status: canon
    source_tier: canon_rda
    productive: true
    domains: [negation, grammar]
    notes: "Use before predicate/action."

  ka:
    core_meaning:
      de: [nein, kein]
      en: [no, none]
    status: canon
    source_tier: canon_rda
    productive: true
    domains: [negation, refusal]
    notes: "Nominal negation and standalone refusal."

  na_prefix:
    written_form: "na-"
    core_meaning:
      de: [un, nicht, lexikalische_negation]
      en: [un, non, lexical_negation]
    status: fanon_strict
    source_tier: fanon_strict
    productive: reviewed_only
    domains: [derivation]
    notes: "Only lexical antonyms, never ordinary sentence negation."

  tok:
    core_meaning:
      de: [gegen, widerstand]
      en: [against, resistance]
    status: canon
    source_tier: canon_series
    productive: true
    domains: [resistance, opposition, tokra]
    examples: ["Tok'ra", "Tok'tar"]

  onak:
    core_meaning:
      de: [gott, goauld, göttliche_macht]
      en: [god, goauld, divine_power]
    status: canon
    source_tier: canon_series
    productive: true
    domains: [religion, authority, imperial]
    notes: "Use for divine/imperial greatness, not physical size."

  tun:
