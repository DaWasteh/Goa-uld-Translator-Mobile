metadata:
  purpose: 'Sprachausbau v6: systematische Schließung von Slang- und Umgangssprache-Lücken (DE/EN) —
    Vulgärregister (Fick-Komplex), Umgangsverben, Slang-Nomen/-Adjektive, Interjektionen und
    Internet-Kurzformen (wtf, omg, lol) für flüssigere Alltagsübersetzung'
  created: '2026-07-04'
  updated: '2026-07-04'
  schema_note: Gleiches Schema wie goauld_overrides.yaml; wird als Overlay nach v5 geladen.
  design_rules:
  - 'Canon bleibt dominant: alle Prioritäten <= 60; v6 durchgehend konservativ fanon_derived (prio 55).'
  - 'Neue Roots aus ägyptischen Etyma (Phonologie-Mapping: ḫ→kh, š→sh, ḏ→dj, ṯ→tj, ꜣ/ꜥ→a, w→u, j→i);
    Komposita aus etablierten Bestandsroots.'
  - Glossen-Nachträge (Slug-Präfix exp_v6_c_) ergänzen umgangssprachliche/vulgäre DE- und EN-Synonyme
    auf bestehenden Formen (neue Keys, gleiche Terme — Bestandseinträge unangetastet).
  - 'Inhaltliche Leitplanke wie v3: allgemeine Vulgär- und Umgangssprache ja; keine diskriminierenden
    Slurs gegen reale Gruppen (Ethnie, Religion, Orientierung, Behinderung).'
  - 'Basis: Lückenscan von ~65 hochfrequenten Slang-/Umgangsformen DE/EN gegen die Engine inkl. Lemmatizer
    (Stand nach v5).'
  - 'review_status: proposed — einzeln hebbar oder streichbar.'

