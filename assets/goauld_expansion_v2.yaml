# ═════════════════════════════════════════════════════════════════════
#  GOA'ULD SPRACHAUSBAU v2  ·  Overlay-Erweiterung
#  341 neue Einträge · Layer A/B/C/D · alle Prioritäten <= 60 (unter Canon)
#  Ladereihenfolge: goauld_overrides.yaml → goauld_expansion_v1.yaml → diese Datei.
# ═════════════════════════════════════════════════════════════════════

metadata:
  purpose: 'Sprachausbau v2: Verben, Adjektive, Körper, Tiere, Gesellschaft, Religion, Handwerk'
  created: '2026-07-03'
  updated: '2026-07-03'
  schema_note: Gleiches Schema wie goauld_overrides.yaml; wird als Overlay nach v1 geladen.
  design_rules:
  - 'Canon bleibt dominant: alle Prioritäten <= 60.'
  - 'Layer A (prio 60): fanon_strict-Komposita aus Registry-/v1-etablierten Roots.'
  - 'Layer B (prio 55): neue Roots aus ägyptischen Etyma (Phonologie-Mapping: ḫ→kh, š→sh, ḏ→dj, ṯ→tj,
    ꜣ/ꜥ→a, w→u, j→i).'
  - 'Layer C (prio 55): Glossen-Nachträge auf bestehende Formen (Basis/Overrides/v1).'
  - 'Layer D (prio 55): fanon_derived-Komposita, die v2-neue Substratwurzeln enthalten.'
  - 'Belegte Formen respektiert: Cha''nok=Tag, Cha''le=weiß, Kor''tal=Stein, Pac''tal=Erde bleiben unangetastet.'
  - 'review_status: proposed — einzeln hebbar oder streichbar.'
