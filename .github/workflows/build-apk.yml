name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Build als Release (signiert, falls Secrets gesetzt)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'   # z.B. v0.3.0 → triggert auch Release-Erstellung

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # erste Builds können lang dauern

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Flutter 3.41.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0 pyyaml

      - name: Show toolchain versions
        run: |
          python --version
          flutter --version
          flet --version
          java -version

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Flutter doctor
        run: flutter doctor -v

      # Release-Signierung: aktivieren NUR wenn Secrets gesetzt sind
      # Setzen unter: Repo → Settings → Secrets and variables → Actions
      #   ANDROID_KEYSTORE_BASE64    (base64-encoded .jks Datei)
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      - name: Decode Keystore (falls Secret vorhanden)
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p ~/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ~/keystore/release.jks
          echo "KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Build APK (debug)
        if: ${{ !inputs.release && !startsWith(github.ref, 'refs/tags/v') }}
        run: flet build apk --verbose

      - name: Build APK (release, unsigned)
        if: ${{ (inputs.release || startsWith(github.ref, 'refs/tags/v')) && env.KEYSTORE_PATH == '' }}
        run: |
          echo "::warning::Keine Keystore-Secrets gesetzt — Release-Build ist UNSIGNED."
          flet build apk --verbose

      - name: Build APK (release, signed)
        if: ${{ (inputs.release || startsWith(github.ref, 'refs/tags/v')) && env.KEYSTORE_PATH != '' }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flet build apk --verbose \
            --android-signing-key-store "$KEYSTORE_PATH" \
            --android-signing-key-store-password "$ANDROID_KEYSTORE_PASSWORD" \
            --android-signing-key-alias "$ANDROID_KEY_ALIAS" \
            --android-signing-key-alias-password "$ANDROID_KEY_PASSWORD"

      - name: List built APKs
        run: ls -lh build/apk/release/*.apk || ls -lh build/apk/**/*.apk || true

      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: goauld-translator-apk-${{ github.sha }}
          path: |
            build/apk/release/*.apk
            build/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/apk/release/*.apk
            build/apk/**/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true

      # Bei Build-Fehler: Logs hochladen damit man debuggen kann
      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            build/**/*.log
            build/flutter/.dart_tool/**/stderr.txt
            build/flutter/.dart_tool/**/stdout.txt
          if-no-files-found: ignore
          retention-days: 7
