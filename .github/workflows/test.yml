name: Tests

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0 pyyaml pytest

      - name: Show versions
        run: |
          python --version
          pip show flet | grep -E '^(Name|Version)'
          pytest --version

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      # Optional: smoke-test der App-Imports auf Linux ohne Flet-Window
      - name: Smoke-test imports
        env:
          GOAULD_ASSETS_DIR: ${{ github.workspace }}/assets
        run: |
          python -c "from goauld_engine import load_full_lexicon, SearchEngine, SentenceAnalyzer, build_mapping, translate_text; print('engine imports OK')"
          python -c "from app.main import main; print('app imports OK')"
